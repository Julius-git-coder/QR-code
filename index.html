<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Inura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    p { color: #555; margin-bottom: 1.5rem; line-height: 1.6; }
    .qr-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 1rem;
      display: inline-block;
      margin-bottom: 1.5rem;
    }
    .qr-wrap img {
      display: block;
      width: 250px;
      height: 250px;
    }
    .qr-label {
      color: #999;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .stores {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }
    .store-btn {
      display: block;
      text-decoration: none;
      border-radius: 12px;
      width: 100%;
      max-width: 320px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }
    .store-btn.text-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: #fff;
      color: #000;
      padding: 0.875rem 2rem;
      font-weight: 600;
      font-size: 1.05rem;
      overflow: visible;
    }
    .store-btn.text-btn svg {
      flex-shrink: 0;
    }
    .store-btn.text-btn .sub {
      font-weight: 400;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="logo.jpeg" alt="Inura" /></div>
    <h1>Download Inura</h1>
    <p>Scan the QR code with your phone or tap a button below.</p>
    <div class="qr-wrap">
      <img id="qrcode" alt="QR Code" />
    </div>
    <div class="qr-label">Scan to download</div>
    <div class="stores">
      <a class="store-btn text-btn" href="https://apps.apple.com/gh/app/inura/id6763043075" target="_blank" rel="noopener">
        <img src="app-store.png" alt="" style="width:28px;height:28px;border-radius:6px;" />
        <span><span class="sub">Download on the</span><br />App Store</span>
      </a>
      <a class="store-btn text-btn" href="https://play.google.com/store/apps/details?id=com.inura.app" target="_blank" rel="noopener">
        <img src="google-play.png" alt="" style="width:28px;height:28px;border-radius:6px;" />
        <span><span class="sub">Get it on</span><br />Google Play</span>
      </a>
    </div>
  </div>

  <script>
    document.getElementById('qrcode').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
      encodeURIComponent(window.location.href);

    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = 'https://apps.apple.com/gh/app/inura/id6763043075';
      } else if (/android/i.test(ua)) {
        window.location.href = 'https://play.google.com/store/apps/details?id=com.inura.app';
      }
    })();
  </script>
</body>
</html>
