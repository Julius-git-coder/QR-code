<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Inura</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    p { color: rgba(255, 255, 255, 0.7); margin-bottom: 1.5rem; line-height: 1.6; }
    .qr-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 1rem;
      display: inline-block;
      margin-bottom: 1.5rem;
    }
    .qr-wrap img {
      display: block;
      width: 250px;
      height: 250px;
    }
    .qr-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .stores {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: #fff;
      color: #000;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1.05rem;
      width: 100%;
      max-width: 320px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
    }
    .store-btn svg { flex-shrink: 0; }
    .store-btn .sub { font-weight: 400; font-size: 0.8rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="logo.jpeg" alt="Inura" /></div>
    <h1>Download Inura</h1>
    <p>Scan the QR code with your phone or tap a button below.</p>
    <div class="qr-wrap">
      <img id="qrcode" alt="QR Code" />
    </div>
    <div class="qr-label">Scan to download</div>
    <div class="stores">
      <a class="store-btn" href="https://apps.apple.com/gh/app/inura/id6763043075" target="_blank" rel="noopener">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/>
        </svg>
        <span><span class="sub">Download on the</span><br />App Store</span>
      </a>
      <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.inura.app" target="_blank" rel="noopener">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.61 4.03 2.64 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.67-.81 1.75-1.34 2.76-1.31.26 2.04-1.02 3.81-2.1 4.06-.66.15-1.66-.53-2.66-1.26z"/>
        </svg>
        <span><span class="sub">Get it on</span><br />Google Play</span>
      </a>
    </div>
  </div>

  <script>
    document.getElementById('qrcode').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
      encodeURIComponent(window.location.href);

    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = 'https://apps.apple.com/gh/app/inura/id6763043075';
      } else if (/android/i.test(ua)) {
        window.location.href = 'https://play.google.com/store/apps/details?id=com.inura.app';
      }
    })();
  </script>
</body>
</html>
